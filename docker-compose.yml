services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: slim_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./docker/apache.conf:/etc/apache2/sites-enabled/000-default.conf
    ports:
      - "8092:80"
    environment:
      APP_ENV: development
    command: >
      bash -c "
        chown -R www-data:www-data /var/www/html/storage &&
        chmod -R 755 /var/www/html/storage &&
        apache2-foreground
      "
    networks:
      - slim_network
      - dev_databases

  mailhog:
    image: mailhog/mailhog:latest
    container_name: slim_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - slim_network

networks:
  slim_network:
    driver: bridge
  dev_databases:
    external: true
    name: dev-databases_default
